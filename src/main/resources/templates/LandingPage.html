<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head>
    <meta charset="UTF-8">
    <title>MakersBnB</title>
</head>
<body>
    <div sec:authorize="isAuthenticated()">
        Hello, you are logged in as <span sec:authentication="principal.attributes['email']"></span>
    </div>
    <h1>Welcome to MakersBnB!</h1>
    <h3 th:text="${nSpaces} + ' spaces are waiting to be discovered...'"></h3>
    <p th:text="${nBookings} + ' bookings were made last week.'"></p>
    <a href="/spaces">See our spaces</a>
    <br>
    <a href="/team">Meet the team</a>
    <br>
    <a href="/contact-us">Contact us</a>
</body>
</html>
